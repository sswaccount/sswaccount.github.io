name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Hugo
        run: |
          curl -L -o hugo.deb "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i hugo.deb

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build
        run: hugo --gc --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Build China mirror
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://blog.pianobuddy.site/" \
            --destination public-cn

      - name: Configure deployment SSH
        env:
          CN_SSH_PRIVATE_KEY: ${{ secrets.CN_SSH_PRIVATE_KEY }}
          CN_SSH_HOST: ${{ secrets.CN_SSH_HOST }}
          CN_SSH_PORT: ${{ secrets.CN_SSH_PORT }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$CN_SSH_PRIVATE_KEY" > ~/.ssh/blog_deploy_key
          chmod 600 ~/.ssh/blog_deploy_key
          ssh-keyscan -p "$CN_SSH_PORT" -H "$CN_SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy China mirror
        env:
          CN_SSH_HOST: ${{ secrets.CN_SSH_HOST }}
          CN_SSH_PORT: ${{ secrets.CN_SSH_PORT }}
          CN_SSH_USER: ${{ secrets.CN_SSH_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/blog_deploy_key -p ${CN_SSH_PORT}" \
            ./public-cn/ \
            "${CN_SSH_USER}@${CN_SSH_HOST}:/root/data/blog/site/"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
