baseURL = 'https://sswaccount.github.io/'
locale = 'zh-cn'
title = 'SswSpace'
theme = 'hugo-theme-stack'
hasCJKLanguage = true

[markup.goldmark.extensions.passthrough]
enable = true

[markup.goldmark.extensions.passthrough.delimiters]
block = [["\\[", "\\]"], ["$$", "$$"]]
inline = [["\\(", "\\)"]]

[pagination]
pagerSize = 10

[permalinks]
post = "/p/:slug/"
page = "/:slug/"

[params]
mainSections = ["post"]
rssFullContent = true

[params.sidebar]
subtitle = "Notes, research, and records."

[params.article]
math = true

[params.comments]
enabled = true
provider = "giscus"

[params.comments.giscus]
repo = "sswaccount/sswaccount.github.io"
repoID = "R_kgDOGMIc1A"
category = "General"
categoryID = "DIC_kwDOGMIc1M4DBURK"
mapping = "pathname"
strict = 0
reactionsEnabled = 1
emitMetadata = 0
inputPosition = "top"
lightTheme = "light"
darkTheme = "dark_dimmed"
lang = "zh-CN"
loading = "lazy"

[params.widgets]
homepage = [
  { type = "search" },
  { type = "archives", params = { limit = 5 } },
  { type = "categories", params = { limit = 10 } },
  { type = "tag-cloud", params = { limit = 20 } },
]
page = [
  { type = "toc" },
]
